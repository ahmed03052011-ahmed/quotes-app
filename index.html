<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Life Lines Quotes – Motivational & Emotional Quotes App</title>

<!-- SEO Meta -->
<meta name="description" content="Life Lines Quotes – Daily motivational, emotional, and love quotes app. Share, favorite, and explore powerful life quotes anytime.">
<meta name="keywords" content="quotes app, life quotes, motivational quotes, emotional quotes, love quotes, daily quotes, share quotes, favorite quotes, inspirational quotes">

<style>
  /* ===== Body & Fonts ===== */
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(to bottom, #ffecd2, #fcb69f);
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
    text-align: center;
  }

  h1 {
    color: #ff6b6b;
    font-size: 2em;
    margin: 15px 0;
    text-shadow: 1px 1px 2px #fff;
  }

  /* ===== Categories Bar ===== */
  #categoryBar {
    display: flex;
    justify-content: flex-start;
    align-items: center;
    width: 100%;
    max-width: 450px;
    margin-bottom: 20px;
  }

  .categoryBtn {
    background-color: #ff6b6b;
    color: white;
    border: none;
    padding: 8px 15px;
    margin-right: 10px;
    border-radius: 12px;
    cursor: pointer;
    font-size: 0.9em;
    transition: all 0.3s ease;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
  }

  .categoryBtn:hover, .categoryBtn.active {
    background-color: #ff4757;
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(0,0,0,0.3);
  }

  /* ===== Quote Card ===== */
  #quote {
    background: white;
    padding: 25px;
    border-radius: 15px;
    max-width: 400px;
    font-size: 1.4em;
    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    transition: transform 0.3s;
    min-height: 120px;
    margin-bottom: 20px;
  }

  #quote:hover {
    transform: scale(1.02);
  }

  /* ===== Buttons ===== */
  .btn {
    padding: 12px 25px;
    margin: 8px;
    border: none;
    border-radius: 12px;
    background-color: #ff6b6b;
    color: white;
    font-size: 1em;
    cursor: pointer;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    transition: all 0.3s ease;
  }

  .btn:hover {
    background-color: #ff4757;
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(0,0,0,0.3);
  }

  @media (max-width: 450px) {
    h1 { font-size: 1.5em; }
    #quote { font-size: 1.2em; padding: 20px; }
    .btn, .categoryBtn { font-size: 0.9em; padding: 10px 15px; }
  }
</style>
</head>

<body>
<h1>Life Lines Quotes</h1>

<!-- Category Buttons -->
<div id="categoryBar">
  <button class="categoryBtn active" onclick="filterCategory('all', this)">All</button>
  <button class="categoryBtn" onclick="filterCategory('love', this)">Love</button>
  <button class="categoryBtn" onclick="filterCategory('pain', this)">Pain</button>
  <button class="categoryBtn" onclick="filterCategory('motivation', this)">Motivation</button>
</div>

<!-- Quote Display -->
<div id="quote">Loading...</div>

<!-- Action Buttons -->
<div>
  <button class="btn" onclick="nextQuote()">Next</button>
  <button class="btn" onclick="randomQuote()">Random</button>
  <button class="btn" onclick="shareQuote()">Share</button>
  <button class="btn" onclick="favoriteQuote()">❤️ Favorite</button>
</div>

<script>
let quotes = [];
let filteredQuotes = [];
let favorites = [];
let index = 0;

// Fetch JSON
fetch("quotes.json")
  .then(res => res.json())
  .then(data => {
    quotes = data.quotes;
    filteredQuotes = quotes;
    showQuote(index);
  })
  .catch(err => {
    document.getElementById("quote").innerText = "Error loading quotes!";
    console.log(err);
  });

// Show quote
function showQuote(i) {
  if(filteredQuotes.length > 0){
    document.getElementById("quote").innerText = filteredQuotes[i].text;
  } else {
    document.getElementById("quote").innerText = "No quotes in this category.";
  }
}

// Next / Random Quote
function nextQuote() {
  if(filteredQuotes.length > 0){
    index = (index + 1) % filteredQuotes.length;
    showQuote(index);
  }
}

function randomQuote() {
  if(filteredQuotes.length > 0){
    index = Math.floor(Math.random() * filteredQuotes.length);
    showQuote(index);
  }
}

// Share Quote
function shareQuote() {
  if(filteredQuotes.length > 0){
    const text = encodeURIComponent(filteredQuotes[index].text);
    const url = "https://api.whatsapp.com/send?text=" + text;
    window.open(url, "_blank");
  }
}

// Favorite Quote
function favoriteQuote() {
  if(filteredQuotes.length > 0){
    let quoteText = filteredQuotes[index].text;
    if(!favorites.includes(quoteText)){
      favorites.push(quoteText);
      alert("Added to favorites! ❤️");
    } else {
      alert("Already in favorites! ❤️");
    }
    console.log("Favorites:", favorites);
  }
}

// Filter by category
function filterCategory(cat, btnElement){
  // Remove active class from all buttons
  document.querySelectorAll('.categoryBtn').forEach(b => b.classList.remove('active'));
  btnElement.classList.add('active');

  if(cat === 'all'){
    filteredQuotes = quotes;
  } else {
    filteredQuotes = quotes.filter(q => q.category === cat);
  }
  index = 0;
  showQuote(index);
}
</script>
</body>
</html>
