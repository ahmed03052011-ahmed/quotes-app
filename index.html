<html lang="ur" dir="rtl">
<head>

<style>

body{
font-family:'Noto Nastaliq Urdu', serif;

h1{

}

.categoryBtn.active{
background: darkblue;

line-height:2;
}

/* MULTI COLOR TEXT (LINES) */

.line2{ color: blue; }
.line3{ color: purple; }

.line5{ color: green; }

<body>

<h1>LIFE LINES WISDOMS</h1>

<!-- SEARCH -->
<input id="searchBox" placeholder="Search..." onkeyup="searchQuotes()">

<p id="viewCount">Viewed: 0</p>

<!-- CATEGORY BUTTONS -->
<div>
<button class="categoryBtn active" onclick="filterCategory('all',this)">All</button>
<button class="categoryBtn" onclick="filterCategory('love',this)">Love</button>
<button class="categoryBtn" onclick="filterCategory('pain',this)">Pain</button>
<button class="categoryBtn" onclick="filterCategory('motivation',this)">Motivation</button>
</div>

<!-- QUOTE BOX -->
<div id="quoteCard">
<h2 id="quoteText">لوڈ ہو رہا ہے…</h2>
</div>

<!-- BUTTONS -->
<div>
<button class="btn" onclick="nextQuote()">Next</button>
<button class="btn" onclick="randomQuote()">Random</button>
<button class="btn" onclick="copyQuote()">Copy</button>
<button class="btn" onclick="shareWhatsApp()">WhatsApp</button>
</div>

<script>

let quotes = [];
let filteredQuotes = [];
let index = 0;

/* FETCH DATA FROM quotes.json */
fetch("quotes.json")
.then(res=>res.json())
.then(data=>{
quotes = data.quotes;
filteredQuotes = quotes;
showQuote();
});

/* SHOW QUOTE WITH MULTI COLOR LINES */
function showQuote(){
if(filteredQuotes.length===0){
quoteText.innerText="No quotes";
return;
}

let lines = filteredQuotes[index].text.split("\n");

/* Assign different colors to each line */
let html = "";
if(lines[0]) html += "<div class='line1'>"+lines[0]+"</div>";
if(lines[1]) html += "<div class='line2'>"+lines[1]+"</div>";
if(lines[2]) html += "<div class='line3'>"+lines[2]+"</div>";
if(lines[3]) html += "<div class='line4'>"+lines[3]+"</div>";
if(lines[4]) html += "<div class='line5'>"+lines[4]+"</div>";

quoteText.innerHTML = html;

updateViews();
}

/* NEXT */
function nextQuote(){
index=(index+1)%filteredQuotes.length;
showQuote();
}

/* RANDOM */
function randomQuote(){
index=Math.floor(Math.random()*filteredQuotes.length);
showQuote();
}

/* SEARCH */
function searchQuotes(){
let val=searchBox.value.toLowerCase();
filteredQuotes=quotes.filter(q=>q.text.toLowerCase().includes(val));
index=0;
showQuote();
}

/* CATEGORY */
function filterCategory(cat,btn){
document.querySelectorAll('.categoryBtn').forEach(b=>b.classList.remove('active'));
btn.classList.add('active');

filteredQuotes = cat==="all"?quotes:quotes.filter(q=>q.category===cat);
index=0;
showQuote();
}

/* COPY */
function copyQuote(){
navigator.clipboard.writeText(filteredQuotes[index].text);
alert("Copied!");
}

/* WHATSAPP */
function shareWhatsApp(){
let text=filteredQuotes[index].text;
window.open("https://wa.me/?text="+encodeURIComponent(text));
}

/* VIEW COUNTER */
let views=localStorage.getItem("views")||0;

function updateViews(){
views++;
localStorage.setItem("views",views);
document.getElementById("viewCount").innerText="Viewed: "+views;
}

</script>

</body>
