<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LIFE LINES WISDOMS – اردو اقتباسات اور حکمت</title>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu:wght@700&display=swap');

*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Noto Nastaliq Urdu', serif;
  background: linear-gradient(135deg,#001f1f,#000000);
  display:flex;
  flex-direction:column;
  align-items:center;
  min-height:100vh;
  padding:20px;
  color:skyblue;
}

h1{
  font-size:2rem;
  color:blue;
  margin-bottom:15px;
  animation: blink 1.5s infinite;
}

/* Card */
#quoteCard{
  background: rgba(0,30,30,0.95);
  padding:25px;
  border-radius:35px;
  border:4px solid #9400d3;
  box-shadow:0 0 35px #9400d3;
  max-width:650px;
  text-align:right;
}

/* Heading blue */
#quoteCard h2{
  color:blue;
}

/* Paragraphs purple */
.p1, .p2, .p3, .p4, .note{
  color:purple;
}

/* Individual blinking (different timing) */
.p1{animation: blink 2s infinite;}
.p2{animation: blink 2.5s infinite;}
.p3{animation: blink 3s infinite;}
.p4{animation: blink 3.5s infinite;}
.note{animation: blink 4s infinite;}

/* Blink animation */
@keyframes blink{
  0%,49%{opacity:1;}
  50%,100%{opacity:0.3;}
}

/* Divider */
.divider{
  width:60%;
  height:2px;
  background:#9400d3;
  margin:15px auto;
}

/* Buttons */
.btn{
  padding:10px 20px;
  margin:5px;
  border:none;
  border-radius:10px;
  background:#6a0dad;
  color:white;
  cursor:pointer;
}

</style>
</head>

<body>

<h1>LIFE LINES WISDOMS</h1>

<div id="quoteCard">
  <h2 id="quoteH2">لوڈ ہو رہا ہے…</h2>
  <div class="divider"></div>

  <p class="p1" id="quoteP1"></p>
  <p class="p2" id="quoteP2"></p>
  <p class="p3" id="quoteP3"></p>
  <p class="p4" id="quoteP4"></p>

  <div class="divider"></div>
  <p class="note" id="quoteNote"></p>
</div>

<div>
  <button class="btn" onclick="nextQuote()">Next Quote</button>
  <button class="btn" onclick="randomQuote()">Random Quote</button>
  <button class="btn" onclick="shareQuoteAsImage()">Share</button>
</div>

<script>
let quotes = [];
let index = 0;

fetch("quotes.json")
.then(res=>res.json())
.then(data=>{
  quotes = data.quotes;
  showQuote(index);
});

function showQuote(i){
  let q = quotes[i].text.split("\n");
  document.getElementById("quoteH2").innerText = q[0] || "";
  document.getElementById("quoteP1").innerText = q[1] || "";
  document.getElementById("quoteP2").innerText = q[2] || "";
  document.getElementById("quoteP3").innerText = q[3] || "";
  document.getElementById("quoteP4").innerText = q[4] || "";
  document.getElementById("quoteNote").innerText = q[5] || "";
}

function nextQuote(){
  index = (index+1)%quotes.length;
  showQuote(index);
}

function randomQuote(){
  index = Math.floor(Math.random()*quotes.length);
  showQuote(index);
}

function shareQuoteAsImage(){
  html2canvas(document.getElementById("quoteCard")).then(canvas=>{
    let link=document.createElement('a');
    link.href=canvas.toDataURL();
    link.download="quote.png";
    link.click();
  });
}
</script>

</body>
</html>
