<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Life Lines Quotes – Motivational & Emotional Quotes App</title>

<!-- SEO Meta Tags -->
<meta name="description" content="Life Lines Quotes – Daily motivational, emotional, and love quotes app. Share, favorite, and explore powerful life quotes anytime.">
<meta name="keywords" content="quotes app, life quotes, motivational quotes, emotional quotes, love quotes, daily quotes, share quotes, favorite quotes, inspirational quotes">

<style>
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(to bottom, #ffecd2, #fcb69f);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
    text-align: center;
  }

  h1 {
    color: #ff6b6b;
    font-size: 2em;
    margin-bottom: 15px;
    text-shadow: 1px 1px 2px #fff;
  }

  select {
    padding: 10px;
    margin-bottom: 15px;
    border-radius: 10px;
    border: 1px solid #ff6b6b;
    font-size: 1em;
  }

  #quote {
    background: white;
    padding: 25px;
    border-radius: 15px;
    max-width: 400px;
    font-size: 1.4em;
    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    transition: transform 0.3s;
    min-height: 120px;
    margin-bottom: 20px;
  }

  #quote:hover {
    transform: scale(1.02);
  }

  button {
    padding: 12px 25px;
    margin: 8px;
    border: none;
    border-radius: 12px;
    background-color: #ff6b6b;
    color: white;
    font-size: 1em;
    cursor: pointer;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    transition: all 0.3s ease;
  }

  button:hover {
    background-color: #ff4757;
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(0,0,0,0.3);
  }

  @media (max-width: 450px) {
    #quote {
      font-size: 1.2em;
      padding: 20px;
    }
    h1 {
      font-size: 1.5em;
    }
    button, select {
      font-size: 0.9em;
      padding: 10px 20px;
    }
  }
</style>
</head>
<body>

<h1>Life Lines Quotes</h1>

<!-- Categories Dropdown -->
<select id="categorySelect" onchange="filterCategory()">
  <option value="all">All Categories</option>
  <option value="love">Love</option>
  <option value="pain">Pain</option>
  <option value="motivation">Motivation</option>
</select>

<div id="quote">Loading...</div>

<button onclick="nextQuote()">Next</button>
<button onclick="randomQuote()">Random</button>
<button onclick="shareQuote()">Share</button>
<button onclick="favoriteQuote()">❤️ Favorite</button>

<script>
let quotes = [];
let filteredQuotes = [];
let favorites = [];
let index = 0;

// Fetch JSON
fetch("quotes.json")
  .then(res => res.json())
  .then(data => {
    quotes = data.quotes;
    filteredQuotes = quotes;
    showQuote(index);
  })
  .catch(err => {
    document.getElementById("quote").innerText = "Error loading quotes!";
    console.log(err);
  });

// Show quote
function showQuote(i) {
  if(filteredQuotes.length > 0){
    document.getElementById("quote").innerText = filteredQuotes[i].text;
  } else {
    document.getElementById("quote").innerText = "No quotes in this category.";
  }
}

// Next Quote
function nextQuote() {
  if(filteredQuotes.length > 0){
    index = (index + 1) % filteredQuotes.length;
    showQuote(index);
  }
}

// Random Quote
function randomQuote() {
  if(filteredQuotes.length > 0){
    index = Math.floor(Math.random() * filteredQuotes.length);
    showQuote(index);
  }
}

// Share Quote
function shareQuote() {
  if(filteredQuotes.length > 0){
    const text = encodeURIComponent(filteredQuotes[index].text);
    const url = "https://api.whatsapp.com/send?text=" + text;
    window.open(url, "_blank");
  }
}

// Favorite Quote
function favoriteQuote() {
  if(filteredQuotes.length > 0){
    let quoteText = filteredQuotes[index].text;
    if(!favorites.includes(quoteText)){
      favorites.push(quoteText);
      alert("Added to favorites! ❤️");
    } else {
      alert("Already in favorites! ❤️");
    }
    console.log("Favorites:", favorites);
  }
}

// Filter by category
function filterCategory() {
  const category = document.getElementById("categorySelect").value;
  if(category === "all"){
    filteredQuotes = quotes;
  } else {
    filteredQuotes = quotes.filter(q => q.category === category);
  }
  index = 0;
  showQuote(index);
}
</script>

</body>
</html>
