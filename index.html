<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Life Lines Wisdoms</title>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu:wght@700&display=swap');

body{
font-family:'Noto Nastaliq Urdu',serif;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
display:flex;
flex-direction:column;
align-items:center;
min-height:100vh;
padding:20px;
color:white;
}

/* APP TITLE */
.appTitle{
font-size:1.9rem;
color:#00ffcc;
margin-bottom:15px;
text-shadow:0 0 15px #00ffcc;
font-weight:bold;
}

/* CATEGORY */
.categoryBar{margin-bottom:15px;}
.categoryBtn{
background:#00ffcc;
color:white;
border:none;
padding:8px 15px;
margin:4px;
border-radius:20px;
cursor:pointer;
font-weight:bold;
}
.categoryBtn.active{background:#0077cc;}

/* CARD */
.card{
max-width:650px;
background:rgba(0,30,30,0.95);
border-radius:35px;
border:4px solid #00ff00;
box-shadow:0 0 35px #00ff00;
padding:30px 20px;
text-align:center;
line-height:2;
margin-bottom:15px;
}

h2{color:gold;}

.p1{color:white;}
.p2{color:#66ff99;}
.p3{color:#ffcc70;}
.p4{color:#00ffcc;}
.p5{color:#ff9999;font-weight:bold;}

.note{color:gold;margin-top:10px;}

.divider{
height:2px;
background:linear-gradient(to right,transparent,#00ff00,transparent);
margin:15px;
}

/* BUTTONS */
.btn{
margin:8px;
padding:10px 15px;
border:none;
border-radius:10px;
background:#00ffcc;
cursor:pointer;
font-weight:bold;
}

#newBtn{
background:#ff9900;
color:white;
display:none;
margin:10px 0;
padding:10px 15px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}
</style>
</head>

<body>

<!-- APP NAME -->
<div class="appTitle">Life Lines Wisdoms</div>

<!-- CATEGORY -->
<div class="categoryBar">
<button class="categoryBtn active" onclick="filterCategory('all',this)">All <span id="allCount"></span></button>
<button class="categoryBtn" onclick="filterCategory('love',this)">Love <span id="loveCount"></span></button>
<button class="categoryBtn" onclick="filterCategory('pain',this)">Pain <span id="painCount"></span></button>
<button class="categoryBtn" onclick="filterCategory('motivation',this)">Motivation <span id="motivationCount"></span></button>
<button class="categoryBtn" onclick="filterCategory('life',this)">Life <span id="lifeCount"></span></button>
<button class="categoryBtn" onclick="filterCategory('sad',this)">Sad <span id="sadCount"></span></button>
<button class="categoryBtn" onclick="filterCategory('islamic',this)">Islamic <span id="islamicCount"></span></button>
</div>

<!-- New Quotes Notification -->
<button id="newBtn" onclick="showNewQuotes()">New Quotes Available!</button>

<!-- CARD -->
<div class="card" id="card">
<h2 id="title"></h2>

<div class="divider"></div>

<p class="p1" id="p1"></p>
<p class="p2" id="p2"></p>
<p class="p3" id="p3"></p>
<p class="p4" id="p4"></p>
<p class="p5" id="p5"></p>

<div class="divider"></div>

<p class="note" id="note"></p>
</div>

<!-- NAVIGATION & SHARE -->
<div>
<button class="btn" onclick="previousQuote()">Previous</button>
<button class="btn" onclick="nextQuote()">Next</button>
<button class="btn" onclick="downloadShare()">Download & Share Quote 📤</button>
</div>

<script>
let quotes=[];
let filteredQuotes=[];
let index=0;
let lastSeenId = localStorage.getItem("lastSeenId") || 0;

// Load quotes.json
fetch("quotes.json")
.then(res=>res.json())
.then(data=>{
quotes=data.quotes;
filteredQuotes = quotes;
updateCategoryCounts();
checkNewQuotes();
showQuote();
});

function showQuote(){
if(filteredQuotes.length===0) return;
let q = filteredQuotes[index];
title.innerHTML = q.title.replace(/\n/g,"<br>");
p1.innerHTML = q.p1.replace(/\n/g,"<br>");
p2.innerHTML = q.p2.replace(/\n/g,"<br>");
p3.innerHTML = q.p3.replace(/\n/g,"<br>");
p4.innerHTML = q.p4.replace(/\n/g,"<br>");
p5.innerHTML = q.p5.replace(/\n/g,"<br>");
note.innerHTML = q.note;
}

function nextQuote(){
index = (index+1)%filteredQuotes.length;
showQuote();
}
function previousQuote(){
index = (index-1 + filteredQuotes.length)%filteredQuotes.length;
showQuote();
}

function filterCategory(cat, btn){
document.querySelectorAll('.categoryBtn').forEach(b=>b.classList.remove('active'));
btn.classList.add('active');
filteredQuotes = cat==="all"?quotes:quotes.filter(q=>q.category===cat);
index=0;
showQuote();
}

function downloadShare(){
html2canvas(document.getElementById("card")).then(canvas=>{
let link=document.createElement("a");
link.download="quote.jpg";
link.href=canvas.toDataURL("image/jpeg");
link.click();

// Open native share dialog (APK devices)
if(navigator.share){
canvas.toBlob(blob=>{
let file = new File([blob], "quote.jpg",{type:"image/jpeg"});
navigator.share({files:[file],title:"Life Lines Wisdoms",text:"Check this quote!"});
});
}
});
}

// Update category counts
function updateCategoryCounts(){
let cats = ["all","love","pain","motivation","life","sad","islamic"];
cats.forEach(cat=>{
let count = cat==="all"?quotes.length:quotes.filter(q=>q.category===cat).length;
document.getElementById(cat+"Count").innerText = `(${count})`;
});
}

// Check new quotes
function checkNewQuotes(){
let maxId = Math.max(...quotes.map(q=>q.id));
if(maxId > lastSeenId){
document.getElementById("newBtn").style.display = "block";
localStorage.setItem("lastSeenId", maxId);
}
}

function showNewQuotes(){
filteredQuotes = quotes;
index=0;
showQuote();
document.getElementById("newBtn").style.display = "none";
}
</script>

</body>
</html>
