<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Life Lines Quotes</title>
<style>
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(to bottom, #ffecd2, #fcb69f);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
    text-align: center;
  }

  h1 {
    color: #ff6b6b;
    font-size: 2em;
    margin-bottom: 20px;
    text-shadow: 1px 1px 2px #fff;
  }

  #quote {
    background: white;
    padding: 25px;
    border-radius: 15px;
    max-width: 400px;
    font-size: 1.4em;
    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    transition: transform 0.3s;
  }

  #quote:hover {
    transform: scale(1.02);
  }

  button {
    padding: 12px 25px;
    margin: 8px;
    border: none;
    border-radius: 12px;
    background-color: #ff6b6b;
    color: white;
    font-size: 1em;
    cursor: pointer;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    transition: all 0.3s ease;
  }

  button:hover {
    background-color: #ff4757;
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(0,0,0,0.3);
  }

  @media (max-width: 450px) {
    #quote {
      font-size: 1.2em;
      padding: 20px;
    }
    h1 {
      font-size: 1.5em;
    }
    button {
      font-size: 0.9em;
      padding: 10px 20px;
    }
  }
</style>
</head>
<body>

<h1>Life Lines Quotes</h1>
<div id="quote">Loading...</div>

<button onclick="nextQuote()">Next</button>
<button onclick="randomQuote()">Random</button>
<button onclick="shareQuote()">Share</button>
<button onclick="favoriteQuote()">❤️ Favorite</button>

<script>
let quotes = [];
let favorites = [];
let index = 0;

fetch("quotes.json")
  .then(res => res.json())
  .then(data => {
    quotes = data.quotes;
    showQuote(index);
  })
  .catch(err => {
    document.getElementById("quote").innerText = "Error loading quotes!";
    console.log(err);
  });

function showQuote(i) {
  document.getElementById("quote").innerText = quotes[i].text;
}

function nextQuote() {
  index = (index + 1) % quotes.length;
  showQuote(index);
}

function randomQuote() {
  index = Math.floor(Math.random() * quotes.length);
  showQuote(index);
}

function shareQuote() {
  if (quotes.length > 0) {
    const text = encodeURIComponent(quotes[index].text);
    const url = "https://api.whatsapp.com/send?text=" + text;
    window.open(url, "_blank");
  }
}

// ✅ New Feature: Save Favorite Quotes
function favoriteQuote() {
  if(quotes.length > 0) {
    let quoteText = quotes[index].text;
    if(!favorites.includes(quoteText)) {
      favorites.push(quoteText);
      alert("Added to favorites! ❤️");
    } else {
      alert("Already in favorites! ❤️");
    }
    console.log("Favorites:", favorites);
  }
}
</script>

</body>
</html>
