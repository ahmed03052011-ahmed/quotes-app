<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Life Lines Quotes</title>

<style>
  body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    color: #333;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 100vh;
    padding: 20px;
    text-align: center;
  }

  h1 {
    color: white;
  }

  #quote {
    font-size: 1.6em;
    margin: 20px;
    background: white;
    padding: 20px;
    border-radius: 12px;
    max-width: 400px;
  }

  button {
    padding: 12px 20px;
    margin: 5px;
    border: none;
    border-radius: 8px;
    background-color: #ff6b6b;
    color: white;
    font-size: 1em;
    cursor: pointer;
  }

  button:hover {
    background-color: #ff4757;
  }
</style>
</head>

<body>

<h1>Life Lines Quotes</h1>

<div id="quote">Loading...</div>

<button onclick="nextQuote()">Next</button>
<button onclick="randomQuote()">Random</button>
<button onclick="shareQuote()">Share</button>

<script>
let quotes = [];
let index = 0;

// IMPORTANT: Local JSON file (for GitHub Pages)
fetch("quotes.json")
  .then(response => response.json())
  .then(data => {
    quotes = data.quotes;
    showQuote(index);
  })
  .catch(error => {
    document.getElementById("quote").innerText = "Error loading quotes!";
    console.log(error);
  });

function showQuote(i) {
  document.getElementById("quote").innerText = quotes[i].text;
}

function nextQuote() {
  index = (index + 1) % quotes.length;
  showQuote(index);
}

function randomQuote() {
  index = Math.floor(Math.random() * quotes.length);
  showQuote(index);
}

function shareQuote() {
  const text = encodeURIComponent(quotes[index].text);
  const url = "https://api.whatsapp.com/send?text=" + text;
  window.open(url, "_blank");
}
</script>

</body>
</html>
