<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LIFE LINES WISDOMS – اردو اقتباسات اور حکمت</title>
<meta name="description" content="LIFE LINES WISDOMS – روزانہ کے اردو اقتباسات، محبت، دکھ اور تحریک کے اقوال۔ شیئر کریں، پسندیدہ بنائیں، اور اپنے دل کو مضبوط کریں۔">
<meta name="keywords" content="اردو اقتباسات, محبت کے اقتباسات, دکھ کے اقتباسات, تحریک کے اقتباسات, شیئر کریں, پسندیدہ اقتباسات">

<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu:wght@700&display=swap');

*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Noto Nastaliq Urdu', serif;
  background: linear-gradient(135deg,#001f1f,#000000);
  display:flex;
  flex-direction:column;
  justify-content:flex-start;
  align-items:center;
  min-height:100vh;
  padding:20px;
  color:white;
}

h1{
  font-size:2rem;
  color:#ffd700;
  margin-bottom:15px;
  text-shadow:0 0 20px gold;
  text-align:center;
}

/* Categories Bar */
#categoryBar{
  display:flex;
  justify-content:flex-start;
  align-items:center;
  width:100%;
  max-width:650px;
  margin-bottom:20px;
  flex-wrap:wrap;
}
.categoryBtn{
  background-color:#ff6b6b;
  color:white;
  border:none;
  padding:10px 20px;
  margin:5px;
  border-radius:20px;
  cursor:pointer;
  font-size:1rem;
  box-shadow:0 5px 15px rgba(0,0,0,0.2);
  transition: all 0.3s ease;
}
.categoryBtn:hover,.categoryBtn.active{
  background-color:#ff4757;
  transform:translateY(-2px);
  box-shadow:0 8px 20px rgba(0,0,0,0.3);
}

/* Quote Card */
#quoteCard{
  background: rgba(0,30,30,0.95);
  padding:25px;
  border-radius:35px;
  border:4px solid #00ffcc;
  box-shadow:0 0 35px #00ffcc;
  max-width:650px;
  line-height:2.0;
  margin-bottom:20px;
  min-height:200px;
  text-align:right;
  transition: transform 0.3s;
}
#quoteCard:hover{
  transform: scale(1.02);
}
h2,h3,p{margin-bottom:10px;}

/* Divider */
.divider{
  width:60%;
  height:2px;
  background:linear-gradient(to right,transparent,#00ffcc,transparent);
  margin:18px auto;
}

/* Action Buttons */
.btn{
  padding:12px 25px;
  margin:8px;
  border:none;
  border-radius:12px;
  background-color:#ff6b6b;
  color:white;
  font-size:1rem;
  cursor:pointer;
  box-shadow:0 5px 15px rgba(0,0,0,0.2);
  transition: all 0.3s ease;
}
.btn:hover{
  background-color:#ff4757;
  transform:translateY(-2px);
  box-shadow:0 8px 20px rgba(0,0,0,0.3);
}

@media(max-width:450px){
  h1{font-size:1.5rem;}
  #quoteCard{font-size:1rem;padding:20px;}
  .btn, .categoryBtn{font-size:0.9rem;padding:10px 15px;}
}
</style>
</head>

<body>

<h1>LIFE LINES WISDOMS</h1>

<!-- Category Buttons -->
<div id="categoryBar">
  <button class="categoryBtn active" onclick="filterCategory('all', this)">All</button>
  <button class="categoryBtn" onclick="filterCategory('love', this)">Love</button>
  <button class="categoryBtn" onclick="filterCategory('pain', this)">Pain</button>
  <button class="categoryBtn" onclick="filterCategory('motivation', this)">Motivation</button>
</div>

<!-- Quote Card -->
<div id="quoteCard">
  <h2 id="quoteH2">لوڈ ہو رہا ہے…</h2>
  <div class="divider"></div>
  <p class="p1" id="quoteP1"></p>
  <p class="p2" id="quoteP2"></p>
  <p class="p3" id="quoteP3"></p>
  <p class="p4" id="quoteP4"></p>
  <div class="divider"></div>
  <p class="note" id="quoteNote"></p>
</div>

<!-- Action Buttons -->
<div>
  <button class="btn" onclick="nextQuote()">Next Quote</button>
  <button class="btn" onclick="randomQuote()">Random Quote</button>
  <button class="btn" onclick="shareQuote()">Share</button>
  <button class="btn" onclick="favoriteQuote()">❤️ Favorite</button>
</div>

<script>
let quotes = [];
let filteredQuotes = [];
let favorites = [];
let index = 0;

// Fetch JSON
fetch("quotes.json")
.then(res=>res.json())
.then(data=>{
  quotes = data.quotes;
  filteredQuotes = quotes;
  showQuote(index);
})
.catch(err=>{
  document.getElementById("quoteH2").innerText="Error loading quotes!";
  console.log(err);
});

// Show quote
function showQuote(i){
  if(filteredQuotes.length>0){
    let q = filteredQuotes[i].text.split("\n");
    document.getElementById("quoteH2").innerText = q[0] || "";
    document.getElementById("quoteP1").innerText = q[1] || "";
    document.getElementById("quoteP2").innerText = q[2] || "";
    document.getElementById("quoteP3").innerText = q[3] || "";
    document.getElementById("quoteP4").innerText = q[4] || "";
    document.getElementById("quoteNote").innerText = q[5] || "";
  } else {
    document.getElementById("quoteH2").innerText = "No quotes in this category.";
  }
}

// Next / Random
function nextQuote(){if(filteredQuotes.length>0){index=(index+1)%filteredQuotes.length;showQuote(index);}}
function randomQuote(){if(filteredQuotes.length>0){index=Math.floor(Math.random()*filteredQuotes.length);showQuote(index);}}

// Share
function shareQuote(){
  if(filteredQuotes.length>0){
    const text=encodeURIComponent(filteredQuotes[index].text);
    const url="https://api.whatsapp.com/send?text="+text;
    window.open(url,"_blank");
  }
}

// Favorite
function favoriteQuote(){
  if(filteredQuotes.length>0){
    let quoteText=filteredQuotes[index].text;
    if(!favorites.includes(quoteText)){
      favorites.push(quoteText);
      alert("Added to favorites! ❤️");
    }else{
      alert("Already in favorites! ❤️");
    }
    console.log("Favorites:",favorites);
  }
}

// Filter by category
function filterCategory(cat, btnElement){
  document.querySelectorAll('.categoryBtn').forEach(b=>b.classList.remove('active'));
  btnElement.classList.add('active');
  if(cat==='all'){filteredQuotes=quotes;}else{filteredQuotes=quotes.filter(q=>q.category===cat);}
  index=0;
  showQuote(index);
}
</script>

</body>
</html>
