<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Life Lines Wisdoms</title>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu:wght@700&display=swap');

body{
    font-family:'Noto Nastaliq Urdu',serif;
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    display:flex;
    flex-direction:column;
    align-items:center;
    min-height:100vh;
    padding:20px;
    color:white;
}

/* APP TITLE */
.appTitle{
    font-size:1.9rem;
    color:#00ffcc;
    margin-bottom:10px;
    text-shadow:0 0 15px #00ffcc;
    font-weight:bold;
}

/* QUOTE COUNT */
.quoteCount{
    margin-bottom:10px;
    color:#ffd700;
}

/* CATEGORY */
.categoryBar{
    margin-bottom:15px;
}
.categoryBtn{
    border:none;
    padding:8px 15px;
    margin:4px;
    border-radius:20px;
    cursor:pointer;
    font-weight:bold;
}
.categoryBtn.active{opacity:0.8;}

/* CATEGORY COLORS */
.categoryBtn.all{background:#00ccff;color:black;}
.categoryBtn.love{background:#ff66cc;color:white;}
.categoryBtn.pain{background:#ff3300;color:white;}
.categoryBtn.motivation{background:#33ff33;color:black;}
.categoryBtn.life{background:#ffcc00;color:black;}
.categoryBtn.sad{background:#9999ff;color:black;}
.categoryBtn.islamic{background:#00cc66;color:white;}

/* CARD */
.card{
    max-width:650px;
    background:rgba(0,30,30,0.95);
    border-radius:35px;
    border:4px solid #00ffcc;
    box-shadow:0 0 35px #00ffcc;
    padding:30px 20px;
    text-align:center;
    line-height:2;
    margin-bottom:15px;
}

h2{color:gold;}

.p1{color:white;}
.p2{color:#66ff99;}
.p3{color:#ffcc70;}
.p4{color:#00ffcc;}
.p5{color:#ff9999;font-weight:bold;}

.note{color:gold;margin-top:10px;}

.divider{
    height:2px;
    background:linear-gradient(to right,transparent,#00ffcc,transparent);
    margin:15px 0;
}

/* BUTTONS */
.btn{
    margin:5px;
    padding:10px 15px;
    border:none;
    border-radius:10px;
    background:#00ffcc;
    cursor:pointer;
    font-weight:bold;
}
</style>
</head>

<body>

<!-- APP NAME -->
<div class="appTitle">Life Lines Wisdoms</div>
<div class="quoteCount" id="quoteCount">Total Quotes: 0</div>

<!-- CATEGORY -->
<div class="categoryBar">
    <button class="categoryBtn all active" onclick="filterCategory('all',this)">All</button>
    <button class="categoryBtn love" onclick="filterCategory('love',this)">Love</button>
    <button class="categoryBtn pain" onclick="filterCategory('pain',this)">Pain</button>
    <button class="categoryBtn motivation" onclick="filterCategory('motivation',this)">Motivation</button>
    <button class="categoryBtn life" onclick="filterCategory('life',this)">Life</button>
    <button class="categoryBtn sad" onclick="filterCategory('sad',this)">Sad</button>
    <button class="categoryBtn islamic" onclick="filterCategory('islamic',this)">Islamic</button>
</div>

<!-- CARD -->
<div class="card" id="card">
    <h2 id="title"></h2>

    <div class="divider"></div>

    <p class="p1" id="p1"></p>
    <p class="p2" id="p2"></p>
    <p class="p3" id="p3"></p>
    <p class="p4" id="p4"></p>
    <p class="p5" id="p5"></p>

    <div class="divider"></div>

    <p class="note" id="note"></p>
</div>

<!-- BUTTONS -->
<div>
    <button class="btn" onclick="previousQuote()">Previous</button>
    <button class="btn" onclick="nextQuote()">Next</button>
    <button class="btn" onclick="sortLatestToOld()">Latest → Old</button>
    <button class="btn" onclick="shareDownload()">Share & Download</button>
</div>

<script>
let quotes=[];
let filteredQuotes=[];
let index=0;

// Fetch quotes.json
fetch("quotes.json")
.then(res=>res.json())
.then(data=>{
    quotes=data.quotes;
    filteredQuotes=quotes;
    document.getElementById("quoteCount").innerText = `Total Quotes: ${quotes.length}`;
    showQuote();
});

// Show quote in card
function showQuote(){
    let q = filteredQuotes[index];
    document.getElementById("title").innerHTML = q.title.replace(/\n/g,"<br>");
    document.getElementById("p1").innerHTML = q.p1.replace(/\n/g,"<br>");
    document.getElementById("p2").innerHTML = q.p2.replace(/\n/g,"<br>");
    document.getElementById("p3").innerHTML = q.p3.replace(/\n/g,"<br>");
    document.getElementById("p4").innerHTML = q.p4.replace(/\n/g,"<br>");
    document.getElementById("p5").innerHTML = q.p5.replace(/\n/g,"<br>");
    document.getElementById("note").innerHTML = q.note || "";
}

// Navigation
function nextQuote(){
    index=(index+1)%filteredQuotes.length;
    showQuote();
}
function previousQuote(){
    index=(index-1+filteredQuotes.length)%filteredQuotes.length;
    showQuote();
}

// Category filter
function filterCategory(cat, btn){
    document.querySelectorAll('.categoryBtn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');

    filteredQuotes = cat==="all"?quotes:quotes.filter(q=>q.category===cat);
    index=0;
    showQuote();
}

// Sort latest → old
function sortLatestToOld(){
    filteredQuotes.reverse();
    index=0;
    showQuote();
}

// Share & Download
function shareDownload(){
    html2canvas(document.getElementById("card")).then(canvas=>{
        // download image
        let link=document.createElement("a");
        link.download="quote.jpg";
        link.href=canvas.toDataURL("image/jpeg");
        link.click();

        // redirect to website for share options
        window.open("https://ahmed03052011.github.io/quotes-app/");
    });
}
</script>

</body>
</html>
